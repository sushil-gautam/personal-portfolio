    <style>
        .terminal-container {
            max-width: 800px;
            margin: 50px auto;
            background: #0a0a0f;
            border-radius: 10px;

#Sushil Gautam

class Student:
    def __init__(self, first_name, last_name):
        self.first_name = first_name
        self.last_name = last_name
        self.courses = []

    def enroll(self, course):

            self.courses.append(course)

            <script type="text/python" id="university_system.py">
#Sushil Gautam
#Student ID: 11844192

import csv

class University_System:
    def __init__(self, students, faculties, courses):
        self.students = students
        self.faculties = faculties
        self.courses = courses

    def add_student(self, student):
        if student not in self.students:
            self.students.append(student)
            return student

    def add_faculty(self, faculty):
        if faculty not in self.faculties:
            self.faculties.append(faculty)
            return faculty

    def add_course(self, course):
        if course not in self.courses:
            self.courses.append(course)
            return course

    def save_students_to_csv(self, filename="students.csv"):
        with open(filename, "w") as file:
            writer = csv.writer(file)
            writer.writerow(["Name", "Enrolled Courses"])
            for student in self.students:
                writer.writerow(student.get_info())
            </script>

            <script type="text/python" id="main.py">
# Sushil Gautam
# Student ID: 11844192

from university_system import University_System
from student import Student
from faculty import Faculty
from course import Course
import hashlib


def hash_password(password):
    return hashlib.sha256(password.encode()).hexdigest()


def create_account():
    print("Welcome to the University System!")
    print("Please create your username and password below to use the system.")

    username = input("Username: ")
    password = input("Password: ")

    hashed_password = hash_password(password)

    print(f"Account created for {username}.")
    return username, hashed_password


def login(saved_username, saved_password):
    print("\nLogin")

    while True:
        username = input("Username: ")
        password = input("Password: ")

        if username == saved_username and hash_password(password) == saved_password:
            print("Login successful!")
            return
        else:
            print("Incorrect username or password. Try again.\n")


def find_student(students, first_name, last_name):
    for student in students:
        if student.first_name == first_name and student.last_name == last_name:
            return student
    return None


def find_course(courses, course_name):
    for course in courses:
        if course.name == course_name:
            return course
    return None


def find_faculty(faculties, first_name, last_name):
    for faculty in faculties:
        if faculty.first_name == first_name and faculty.last_name == last_name:
            return faculty
    return None


def show_all_students(students):
    print("\nAll Students:")
    if not students:
        print("No students saved.")
    else:
        for student in students:
            print(student.get_info())


def show_all_faculty(faculties):
    print("\nAll Faculty:")
    if not faculties:
        print("No faculty saved.")
    else:
        for faculty in faculties:
            print(f"{faculty.first_name} {faculty.last_name}")


def show_all_courses(courses):
    print("\nAll Courses:")
    if not courses:
        print("No courses saved.")
    else:
        for course in courses:
            print(course.get_info())


def show_student_enrollments(students):
    print("\nStudent Enrollment Data:")
    if not students:
        print("No students saved.")
    else:
        for student in students:
            print(student.get_info())


def show_faculty_courses(faculties):
    print("\nFaculty Course Assignments:")
    if not faculties:
        print("No faculty saved.")
    else:
        for faculty in faculties:
            print(f"\nFaculty: {faculty.first_name} {faculty.last_name}")

            if faculty.courses:
                for course in faculty.courses:
                    print(f"- {course.name}")
            else:
                print("No courses assigned.")


def main():
    students = []
    faculties = []
    courses = []

    university = University_System(students, faculties, courses)

    saved_username, saved_password = create_account()
    login(saved_username, saved_password)

    while True:
        print("\nUniversity System Menu")
        print("1. Add Student / Faculty / Course")
        print("2. View or Enroll Courses")
        print("3. View Students / Faculty / Courses")
        print("4. Exit")

        choice = input("Enter your choice: ")

        if choice == "1":
            print("\nAdd Menu")
            print("1. Add Student")
            print("2. Add Faculty")
            print("3. Add Course")
            print("4. Back to Main Menu")

            add_choice = input("Enter your choice: ")

            if add_choice == "1":
                first_name = input("Student first name: ")
                last_name = input("Student last name: ")

                student = Student(first_name, last_name)
                university.add_student(student)
                university.save_students_to_csv()

                print("Student added successfully.")

            elif add_choice == "2":
                first_name = input("Faculty first name: ")
                last_name = input("Faculty last name: ")

                faculty = Faculty(first_name, last_name)
                university.add_faculty(faculty)
                university.save_students_to_csv()

                print("Faculty added successfully.")

            elif add_choice == "3":
                course_name = input("Course name: ")

                course = Course(course_name)
                university.add_course(course)
                university.save_students_to_csv()

                print("Course added successfully.")

            elif add_choice == "4":
                continue

            else:
                print("Invalid choice.")

        elif choice == "2":
            print("\nView or Enroll Courses Menu")
            print("1. Enroll Student in Course")
            print("2. Assign Course to Faculty")
            print("3. View Student Enrollment Data")
            print("4. View Faculty Course Assignments")
            print("5. Back to Main Menu")

            course_choice = input("Enter your choice: ")

            if course_choice == "1":
                student_first = input("Student first name: ")
                student_last = input("Student last name: ")
                course_name = input("Course name: ")

                student = find_student(students, student_first, student_last)
                course = find_course(courses, course_name)

                if student and course:
                    student.enroll(course)
                    university.save_students_to_csv()
                    print("Student enrolled in course successfully.")
                else:
                    print("Student or course not found.")

            elif course_choice == "2":
                faculty_first = input("Faculty first name: ")
                faculty_last = input("Faculty last name: ")
                course_name = input("Course name: ")

                faculty = find_faculty(faculties, faculty_first, faculty_last)
                course = find_course(courses, course_name)

                if faculty and course:
                    faculty.assign_course(course)
                    university.save_students_to_csv()
                    print("Course assigned to faculty successfully.")
                else:
                    print("Faculty or course not found.")

            elif course_choice == "3":
                show_student_enrollments(students)

            elif course_choice == "4":
                show_faculty_courses(faculties)

            elif course_choice == "5":
                continue

            else:
                print("Invalid choice.")

        elif choice == "3":
            print("\nView Data Menu")
            print("1. View All Students")
            print("2. View All Faculty")
            print("3. View All Courses")
            print("4. Back to Main Menu")

            view_choice = input("Enter your choice: ")

            if view_choice == "1":
                show_all_students(students)

            elif view_choice == "2":
                show_all_faculty(faculties)

            elif view_choice == "3":
                show_all_courses(courses)

            elif view_choice == "4":
                continue

            else:
                print("Invalid choice.")

        elif choice == "4":
            university.save_students_to_csv()
            print("Thank you for using the University System.")
            break

        else:
            print("Invalid choice. Please try again.")


main()
            </script>

            <script>
                async function runUniversityTerminal() {
                    const outputElement = document.getElementById("terminal-output");
                    const statusIndicator = document.getElementById("status-indicator");
                    const promptElement = document.getElementById("terminal-prompt");
                    const inputElement = document.getElementById("terminal-input");
                    const submitButton = document.getElementById("terminal-submit");

                    function printToConsole(text = "") {
                        outputElement.textContent += text + "\n";
                        const terminalBody = document.getElementById("terminal-body");
                        terminalBody.scrollTop = terminalBody.scrollHeight;
                    }

                    function askInput(promptText) {
                        promptElement.textContent = promptText;
                        inputElement.value = "";
                        inputElement.focus();
                        return new Promise((resolve) => {
                            const submit = () => {
                                const value = inputElement.value.trim();
                                printToConsole(`${promptText}${value}`);
                                submitButton.removeEventListener("click", submit);
                                inputElement.removeEventListener("keydown", onKeyDown);
                                resolve(value);
                            };
                            const onKeyDown = (event) => {
                                if (event.key === "Enter") {
                                    submit();
                                }
                            };
                            submitButton.addEventListener("click", submit);
                            inputElement.addEventListener("keydown", onKeyDown);
                        });
                    }

                    async function hashPassword(password) {
                        const bytes = new TextEncoder().encode(password);
                        const digest = await crypto.subtle.digest("SHA-256", bytes);
                        return Array.from(new Uint8Array(digest))
                            .map((b) => b.toString(16).padStart(2, "0"))
                            .join("");
                    }

                    try {
                        statusIndicator.textContent = "Online. Interactive University session.";
                        statusIndicator.style.color = "#27c93f";

                        const students = [];
                        const faculties = [];
                        const courses = [];

                        const findStudent = (firstName, lastName) =>
                            students.find((s) => s.firstName === firstName && s.lastName === lastName);
                        const findFaculty = (firstName, lastName) =>
                            faculties.find((f) => f.firstName === firstName && f.lastName === lastName);
                        const findCourse = (courseName) => courses.find((c) => c.name === courseName);

                        printToConsole("Welcome to the University System!");
                        printToConsole("Please create your username and password below to use the system.");
                        const savedUsername = await askInput("Username: ");
                        const createdPassword = await askInput("Password: ");
                        const savedPassword = await hashPassword(createdPassword);
                        printToConsole(`Account created for ${savedUsername}.`);

                        printToConsole("");
                        printToConsole("Login");
                        while (true) {
                            const username = await askInput("Username: ");
                            const password = await askInput("Password: ");
                            const isValid = username === savedUsername && (await hashPassword(password)) === savedPassword;
                            if (isValid) {
                                printToConsole("Login successful!");
                                break;
                            }
                            printToConsole("Incorrect username or password. Try again.");
                            printToConsole("");
                        }

                        while (true) {
                            printToConsole("");
                            printToConsole("University System Menu");
                            printToConsole("1. Add Student / Faculty / Course");
                            printToConsole("2. View or Enroll Courses");
                            printToConsole("3. View Students / Faculty / Courses");
                            printToConsole("4. Exit");

                            const choice = await askInput("Enter your choice: ");
                            if (choice === "1") {
                                printToConsole("");
                                printToConsole("Add Menu");
                                printToConsole("1. Add Student");
                                printToConsole("2. Add Faculty");
                                printToConsole("3. Add Course");
                                printToConsole("4. Back to Main Menu");
                                const addChoice = await askInput("Enter your choice: ");

                                if (addChoice === "1") {
                                    const firstName = await askInput("Student first name: ");
                                    const lastName = await askInput("Student last name: ");
                                    students.push({ firstName, lastName, courses: [] });
                                    printToConsole("Student added successfully.");
                                } else if (addChoice === "2") {
                                    const firstName = await askInput("Faculty first name: ");
                                    const lastName = await askInput("Faculty last name: ");
                                    faculties.push({ firstName, lastName, courses: [] });
                                    printToConsole("Faculty added successfully.");
                                } else if (addChoice === "3") {
                                    const courseName = await askInput("Course name: ");
                                    courses.push({ name: courseName, faculty: null });
                                    printToConsole("Course added successfully.");
                                } else if (addChoice !== "4") {
                                    printToConsole("Invalid choice.");
                                }
                            } else if (choice === "2") {
                                printToConsole("");
                                printToConsole("View or Enroll Courses Menu");
                                printToConsole("1. Enroll Student in Course");
                                printToConsole("2. Assign Course to Faculty");
                                printToConsole("3. View Student Enrollment Data");
                                printToConsole("4. View Faculty Course Assignments");
                                printToConsole("5. Back to Main Menu");
                                const courseChoice = await askInput("Enter your choice: ");

                                if (courseChoice === "1") {
                                    const firstName = await askInput("Student first name: ");
                                    const lastName = await askInput("Student last name: ");
                                    const courseName = await askInput("Course name: ");
                                    const student = findStudent(firstName, lastName);
                                    const course = findCourse(courseName);
                                    if (student && course) {
                                        if (!student.courses.includes(course.name)) {
                                            student.courses.push(course.name);
                                        }
                                        printToConsole("Student enrolled in course successfully.");
                                    } else {
                                        printToConsole("Student or course not found.");
                                    }
                                } else if (courseChoice === "2") {
                                    const firstName = await askInput("Faculty first name: ");
                                    const lastName = await askInput("Faculty last name: ");
                                    const courseName = await askInput("Course name: ");
                                    const faculty = findFaculty(firstName, lastName);
                                    const course = findCourse(courseName);
                                    if (faculty && course) {
                                        if (!faculty.courses.includes(course.name)) {
                                            faculty.courses.push(course.name);
                                        }
                                        course.faculty = `${faculty.firstName} ${faculty.lastName}`;
                                        printToConsole("Course assigned to faculty successfully.");
                                    } else {
                                        printToConsole("Faculty or course not found.");
                                    }
                                } else if (courseChoice === "3") {
                                    printToConsole("");
                                    printToConsole("Student Enrollment Data:");
                                    if (!students.length) {
                                        printToConsole("No students saved.");
                                    } else {
                                        students.forEach((s) =>
                                            printToConsole(`['${s.firstName} ${s.lastName}', '${s.courses.join(", ")}']`)
                                        );
                                    }
                                } else if (courseChoice === "4") {
                                    printToConsole("");
                                    printToConsole("Faculty Course Assignments:");
                                    if (!faculties.length) {
                                        printToConsole("No faculty saved.");
                                    } else {
                                        faculties.forEach((f) => {
                                            printToConsole("");
                                            printToConsole(`Faculty: ${f.firstName} ${f.lastName}`);
                                            if (!f.courses.length) {
                                                printToConsole("No courses assigned.");
                                            } else {
                                                f.courses.forEach((c) => printToConsole(`- ${c}`));
                                            }
                                        });
                                    }
                                } else if (courseChoice !== "5") {
                                    printToConsole("Invalid choice.");
                                }
                            } else if (choice === "3") {
                                printToConsole("");
                                printToConsole("View Data Menu");
                                printToConsole("1. View All Students");
                                printToConsole("2. View All Faculty");
                                printToConsole("3. View All Courses");
                                printToConsole("4. Back to Main Menu");
                                const viewChoice = await askInput("Enter your choice: ");

                                if (viewChoice === "1") {
                                    printToConsole("");
                                    printToConsole("All Students:");
                                    if (!students.length) {
                                        printToConsole("No students saved.");
                                    } else {
                                        students.forEach((s) =>
                                            printToConsole(`['${s.firstName} ${s.lastName}', '${s.courses.join(", ")}']`)
                                        );
                                    }
                                } else if (viewChoice === "2") {
                                    printToConsole("");
                                    printToConsole("All Faculty:");
                                    if (!faculties.length) {
                                        printToConsole("No faculty saved.");
                                    } else {
                                        faculties.forEach((f) => printToConsole(`${f.firstName} ${f.lastName}`));
                                    }
                                } else if (viewChoice === "3") {
                                    printToConsole("");
                                    printToConsole("All Courses:");
                                    if (!courses.length) {
                                        printToConsole("No courses saved.");
                                    } else {
                                        courses.forEach((c) =>
                                            printToConsole(`{'course_name': '${c.name}', 'faculty_name': '${c.faculty ?? "None"}'}`)
                                        );
                                    }
                                } else if (viewChoice !== "4") {
                                    printToConsole("Invalid choice.");
                                }
                            } else if (choice === "4") {
                                printToConsole("Thank you for using the University System.");
                                promptElement.textContent = "Session ended";
                                inputElement.disabled = true;
                                submitButton.disabled = true;
                                break;
                            } else {
                                printToConsole("Invalid choice. Please try again.");
                            }
                        }

                    } catch (err) {
                        printToConsole("CRASH: " + err);
                        statusIndicator.textContent = "Offline. Fatal Error.";
                        statusIndicator.style.color = "#ff5f56";
                    }
                }
                
                runUniversityTerminal();
            </script>
        </div>
    </main>
