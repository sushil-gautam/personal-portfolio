<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University System Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- Ultra-stable Pyodide Core -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    
    <style>
        .terminal-container {
            max-width: 800px;
            margin: 50px auto;
            background: #0a0a0f;
            border-radius: 10px;
            border: 1px solid var(--accent-color-1);
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.2);
            overflow: hidden;
            padding: 20px;
            min-height: 500px;
            display: flex;
            flex-direction: column;
        }
        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .terminal-body {
            flex-grow: 1;
            font-family: 'Courier New', Courier, monospace;
            color: #27c93f;
            font-size: 16px;
            line-height: 1.5;
            white-space: pre-wrap;
            overflow-y: auto;
            max-height: 500px;
        }
    </style>
</head>
<body>
    <div class="glow-bg top-left"></div>
    <div class="glow-bg bottom-right"></div>

    <main style="padding-top: 50px;">
        <div class="section-header fade-in" style="opacity: 1; transform: none;">
            <h2>University <span class="gradient-text">System</span> Terminal</h2>
            <p style="color: #4facfe; margin-top: 10px; font-weight: bold;" id="status-indicator">
                Connecting...
            </p>
        </div>

        <div class="terminal-container fade-in delay-1" style="opacity: 1; transform: none;">
            <div class="header-controls">
                <div style="display: flex; gap: 8px;">
                    <div style="width: 12px; height: 12px; border-radius: 50%; background: #ff5f56;"></div>
                    <div style="width: 12px; height: 12px; border-radius: 50%; background: #ffbd2e;"></div>
                    <div style="width: 12px; height: 12px; border-radius: 50%; background: #27c93f;"></div>
                </div>
                <a href="index.html" class="btn secondary-btn" style="padding: 5px 15px; font-size: 0.9rem;">Disconnect & Return</a>
            </div>
            
            <div class="terminal-body" id="terminal-body">
                <span id="terminal-output"></span>
            </div>
            
            <script type="text/python" id="main.py">
#Sushil Gautam
#Student ID: 11844192

class BankAccount:
  def __init__(self, owner, balance=0):
    self.owner = owner
    self.balance = balance
    self.transactions = []

  def deposit(self, amount):
    if amount > 0:
      self.balance += amount
      self.transactions.append(f"Deposit: ${amount}")
      print(f"Deposited ${amount}. New balance: ${self.balance}")

  def withdraw(self, amount):
    if amount <= self.balance:
      self.balance -= amount
      self.transactions.append(f"Withdraw: ${amount}")
      print(f"Withdrew ${amount}. New balance: ${self.balance}")
    else:
      print("Insufficient balance.")

  def check_balance(self):
    print(f"Current balance: ${self.balance}")

  def mini_statement(self):
    print("Recent transactions:")
    if not self.transactions:
      print("No transactions yet.")
      return
    for item in self.transactions:
      print(item)


def show_menu():
  print("===== SIMPLE BANKING SYSTEM =====")
  print("1. Deposit")
  print("2. Withdraw")
  print("3. Check Balance")
  print("4. Mini Statement")
  print("5. Exit")


account = BankAccount("Sushil", 1000)
menu_actions = [
  ("3", None),
  ("1", 250),
  ("2", 100),
  ("4", None),
  ("5", None),
]

for choice, value in menu_actions:
  show_menu()
  print(f"Select option: {choice}")
  if choice == "1":
    account.deposit(value)
  elif choice == "2":
    account.withdraw(value)
  elif choice == "3":
    account.check_balance()
  elif choice == "4":
    account.mini_statement()
  elif choice == "5":
    print("Thank you for using Simple Banking System.")
    break
  print("")
            </script>

            <script>
                async function main() {
                    const outputElement = document.getElementById("terminal-output");
                    const statusIndicator = document.getElementById("status-indicator");

                    function printToConsole(text) {
                        outputElement.innerHTML += text + "\n";
                    }

                    try {
                        let pyodide = await loadPyodide();
                        
                        let sysMain = document.getElementById("main.py").textContent;

                        // Create the virtual file system explicitly
                        pyodide.FS.writeFile("main.py", sysMain.trim());

                        statusIndicator.textContent = "Status: Running simple banking system...";
                        let pythonConsoleOutput = "";
                        pyodide.setStdout({
                            batched: (text) => {
                                pythonConsoleOutput += text;
                            }
                        });
                        pyodide.setStderr({
                            batched: (text) => {
                                pythonConsoleOutput += text;
                            }
                        });

                        await pyodide.runPythonAsync("import main");

                        printToConsole(pythonConsoleOutput.trim());
                        
                        statusIndicator.textContent = "Online. Banking session complete.";
                        statusIndicator.style.color = "#27c93f";

                    } catch (err) {
                        printToConsole("\n<span style='color: #ff5f56;'>CRASH: " + err + "</span>");
                        statusIndicator.textContent = "Offline. Fatal Error.";
                        statusIndicator.style.color = "#ff5f56";
                    }
                }
                
                main();
            </script>
        </div>
    </main>
</body>
</html>
