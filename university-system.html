            <script type="text/python" id="student.py">
#Sushil Gautam
#Student ID: 11844192

#define class student with attributes first_name, last_name, and courses
class Student:
  def __init__(self, first_name, last_name):
    self.first_name = first_name
    self.last_name = last_name
    self.courses = []  #this is list of course objects

#define methods for class Student, enroll(course) to add course if not in list
  def enroll(self, course):
    if course not in self.courses:
      self.courses.append(course)

#define methods get_info, that returns student name and enrolled courses
  def get_info(self):
    return [f"{self.first_name} {self.last_name}", ", ".join([course.name for course in self.courses])]
            </script>

            <script type="text/python" id="university_system.py">
#Sushil Gautam

#import csv
import csv

#define class University with attributes students, faculties and courses
class University_System:
  def __init__(self, students, faculties, courses):
    self.students = students
    self.faculties = faculties
    self.courses = courses

#define methods add_students(first_name, last_name) to add students
  def add_student(self, student):
    if student not in self.students:
      self.students.append(student)
      return student

#define methods add_faculty(first_name, last_name) that adds faculty object to faculties
  def add_faculty(self, faculty):
    if faculty not in self.faculties:
      self.faculties.append(faculty)
      return faculty

#define methods add_course(course_name) that adds course object to courses
  def add_course(self, course):
    if course not in self.courses:
      self.courses.append(course)
      return course

#define save to csv to save each students name and enrolled course to a csv file
  def save_students_to_csv(self, filename="students.csv"):
    with open(filename, "w") as file:
      writer = csv.writer(file)
      writer.writerow(["Name", "Enrolled Courses"])
      for student in self.students:
        writer.writerow(student.get_info())
            </script>

            <script type="text/python" id="main.py">
#Sushil Gautam
#Student ID: 11844192
 
#import university_system, student, faculty, and course
from university_system import University_System
from student import Student
from faculty import Faculty
from course import Course
 
def show_menu():
  print("1. Add Student")
  print("2. Add Course")
  print("3. Add Faculty")
  print("4. Enroll Student in Course")
  print("5. Assign Course to Faculty")
  print("6. Save and Exit")

def find_student(students, first_name, last_name):
  for student in students:
    if student.first_name == first_name and student.last_name == last_name:
      return student
  return None

def find_faculty(faculties, first_name, last_name):
  for faculty in faculties:
    if faculty.first_name == first_name and faculty.last_name == last_name:
      return faculty
  return None

def find_course(courses, course_name):
  for course in courses:
    if course.name == course_name:
      return course
  return None

# Menu-driven flow (predefined actions so it can run in browser without console input)
university = University_System([], [], [])
menu_actions = [
  ("1", ("Sushil", "Gautam")),
  ("1", ("Dhan", "Basu")),
  ("2", "Math"),
  ("2", "CSCE1035"),
  ("2", "CSCE1015"),
  ("3", ("aashish", "Pandey")),
  ("3", ("arup", "datta")),
  ("3", ("Liu", "xianog")),
  ("4", ("Sushil", "Gautam", "Math")),
  ("4", ("Dhan", "Basu", "CSCE1015")),
  ("4", ("Sushil", "Gautam", "CSCE1035")),
  ("5", ("aashish", "Pandey", "CSCE1035")),
  ("5", ("arup", "datta", "CSCE1015")),
  ("5", ("Liu", "xianog", "Math")),
  ("6", None),
]

for choice, payload in menu_actions:
  show_menu()
  print(f"Selected option: {choice}")

  if choice == "1":
    first_name, last_name = payload
    university.add_student(Student(first_name, last_name))
  elif choice == "2":
    university.add_course(Course(payload))
  elif choice == "3":
    first_name, last_name = payload
    university.add_faculty(Faculty(first_name, last_name))
  elif choice == "4":
    first_name, last_name, course_name = payload
    student = find_student(university.students, first_name, last_name)
    course = find_course(university.courses, course_name)
    if student and course:
      student.enroll(course)
  elif choice == "5":
    first_name, last_name, course_name = payload
    faculty = find_faculty(university.faculties, first_name, last_name)
    course = find_course(university.courses, course_name)
    if faculty and course:
      faculty.assign_course(course)
  elif choice == "6":
    university.save_students_to_csv()
    print("Data saved to students.csv")
    break
            </script>

            <script>
                async function main() {
                    const outputElement = document.getElementById("terminal-output");
                    const statusIndicator = document.getElementById("status-indicator");

                    function printToConsole(text) {
                        outputElement.innerHTML += text + "\n";
                    }

                    try {
                        let pyodide = await loadPyodide();
                        
                        // Extract codes exactly as the user wrote them
                        let classCourse = document.getElementById("course.py").textContent;
                        let classFaculty = document.getElementById("faculty.py").textContent;
                        let classStudent = document.getElementById("student.py").textContent;
                        let classUni = document.getElementById("university_system.py").textContent;
                        let sysMain = document.getElementById("main.py").textContent;

                        // Create the virtual file system explicitly
                        pyodide.FS.writeFile("course.py", classCourse.trim());
                        pyodide.FS.writeFile("faculty.py", classFaculty.trim());
                        pyodide.FS.writeFile("student.py", classStudent.trim());
                        pyodide.FS.writeFile("university_system.py", classUni.trim());
                        pyodide.FS.writeFile("main.py", sysMain.trim());

                        statusIndicator.textContent = "Status: Executing main.py module...";
                        
                        printToConsole("> Executing your 'University System' framework...");
                        
                        // Execute the pure user main.py module
                        await pyodide.runPythonAsync("import main");
                        
                        printToConsole(">> main.py executed cleanly with 0 errors!");
                        printToConsole(">> Output object generated...");
                        printToConsole("\n> Locating generated students.csv file in Virtual Memory...");

                        // Display the generated CSV results
                        let csvData = pyodide.FS.readFile("students.csv", { encoding: "utf8" });
                        
                        printToConsole(">> File located! Outputting contents:\n");
                        printToConsole("=========================================");
                        printToConsole(csvData);
                        printToConsole("=========================================");
                        printToConsole("\nStatus: Architecture Run Complete.");
                        
                        statusIndicator.textContent = "Online. Execution Successful.";
                        statusIndicator.style.color = "#27c93f";

                    } catch (err) {
                        printToConsole("\n<span style='color: #ff5f56;'>CRASH: " + err + "</span>");
                        statusIndicator.textContent = "Offline. Fatal Error.";
                        statusIndicator.style.color = "#ff5f56";
                    }
                }
                
                main();
            </script>

    </main>
